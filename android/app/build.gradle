plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.dreammoon.dream_manga_reader"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.dreammoon.dream_manga_reader"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        // 固定发布签名:随仓库入库的 keystore(dmr-release.jks),CI 与本地构建**共用同一签名**。
        // 这样每次 release 的 APK 签名一致 → 能覆盖安装(应用内一键更新)。
        // 注:此 keystore 为「公开凭据」(密码随仓库,与原 debug 签名同安全级别),
        // 目的只是稳定签名以支持覆盖更新;要更强安全再换成 CI secrets 注入的正式密钥。
        release {
            storeFile = file("dmr-release.jks")
            storePassword = "dreammangareader"
            keyAlias = "dmr"
            keyPassword = "dreammangareader"
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
        }
    }
}

flutter {
    source = "../.."
}
